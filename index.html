<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Clicker</title>
  <link rel="icon" type="image/png" href="assets/cat-nobg.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="flex flex-col items-center justify-center min-h-screen select-none">

  <!-- Card container -->
  <div class="flex flex-col items-center gap-6 bg-white/10 backdrop-blur-md rounded-3xl px-12 py-10 shadow-2xl border border-white/20">

    <!-- Title -->
    <h1 class="shimmer-text text-3xl font-black tracking-wide">🐾 Cat Clicker</h1>

    <!-- Reaction bubble -->
    <div id="reaction"
         class="min-h-[48px] flex items-center justify-center text-2xl font-bold text-white drop-shadow-lg px-5 py-2 rounded-full bg-white/20 border border-white/30 min-w-[180px] text-center">
    </div>

    <!-- Cat button -->
    <button id="cat"
            class="cat-btn text-8xl leading-none bg-white/20 hover:bg-white/30 border-4 border-white/40 rounded-full w-40 h-40 flex items-center justify-center shadow-xl cursor-pointer focus:outline-none focus:ring-4 focus:ring-white/50">
      🐱
    </button>

    <!-- Counter -->
    <div class="flex flex-col items-center gap-1">
      <p id="counter"
         class="text-5xl font-black text-white drop-shadow-lg">0</p>
      <span class="text-white/70 text-sm font-bold uppercase tracking-widest">clicks</span>
    </div>

    <!-- Milestone badge -->
    <div id="milestone" class="hidden text-yellow-300 font-black text-lg animate-bounce">🎉 Milestone!</div>

  </div>

  <!-- Floating particles container -->
  <div id="particles" class="fixed inset-0 pointer-events-none overflow-hidden"></div>

  <script src="script.js"></script>
</body>
</html>
