<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Clicker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes catBounce {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.3); }
    }
    .cat-bounce {
      animation: catBounce 300ms ease;
    }

    @keyframes reactionFloat {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .reaction-float {
      animation: reactionFloat 500ms ease;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-50">

  <div id="reaction"></div>
  <button id="cat">🐱</button>
  <p id="counter">Clicks: 0</p>

  <script>
    // DOM references (4.7)
    const catEl = document.getElementById('cat');
    const counterEl = document.getElementById('counter');
    const reactionEl = document.getElementById('reaction');

    // State (4.1)
    let clickCount = 0;
    let lastReactionIndex = -1;
    const reactions = [
      "😻 So cute!",
      "🐾 Purrfect!",
      "😺 Meow!",
      "🙀 Whoa!",
      "😸 Hehe!",
      "💕 Loves it!",
      "🐟 Feed me!",
      "😹 LOL!"
    ];

    // 4.2 — pick a random reaction, never the same as the last one
    function selectReaction() {
      let index;
      do {
        index = Math.floor(Math.random() * reactions.length);
      } while (reactions.length > 1 && index === lastReactionIndex);
      lastReactionIndex = index;
      return reactions[index];
    }

    // 4.3 — sync counter element to current clickCount
    function updateCounter() {
      counterEl.textContent = "Clicks: " + clickCount;
    }

    // 4.4 — display reaction text and re-trigger float animation
    function showReaction(text) {
      reactionEl.textContent = text;
      reactionEl.classList.remove('reaction-float');
      void reactionEl.offsetWidth; // force reflow
      reactionEl.classList.add('reaction-float');
    }

    // 4.5 — re-trigger cat bounce animation
    function playClickAnimation() {
      catEl.classList.remove('cat-bounce');
      void catEl.offsetWidth; // force reflow
      catEl.classList.add('cat-bounce');
    }

    // 4.6 — main click handler
    function handleCatClick() {
      clickCount++;
      updateCounter();
      const text = selectReaction();
      showReaction(text);
      playClickAnimation();
    }

    // 4.7 — attach listener
    catEl.addEventListener('click', handleCatClick);
  </script>
</body>
</html>
